<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pac-Man – lmoney.vip</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0f0e17; color: #fff;
    font-family: 'Nunito', sans-serif; overflow: hidden; user-select: none; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; background: #0f0e17; border-bottom: 1px solid #2a2a3e; z-index: 10;
  }
  #back-link { color: #a8a8b3; text-decoration: none; font-size: 15px; }
  #back-link:hover { color: #fff; }
  #score-display { font-family: 'Fredoka One', cursive; font-size: 22px; color: #ffd700; }
  #lives-display { display: flex; gap: 4px; align-items: center; min-width: 80px; justify-content: flex-end; }

  #game-wrap {
    position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas { display: block; touch-action: none; }

  #mobile-controls {
    display: none; position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    width: 168px; height: 168px; z-index: 10;
  }
  @media (pointer: coarse) {
    #mobile-controls { display: block; }
    #game-wrap { bottom: 192px; }
  }
  .dpad-btn {
    position: absolute; width: 52px; height: 52px;
    background: #1a1a2e; border: 2px solid #2a2a3e; border-radius: 10px;
    color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn.pressed { background: #3a3a5e; border-color: #ffd700; }
  #btn-up    { top: 0;    left: 58px; }
  #btn-down  { bottom: 0; left: 58px; }
  #btn-left  { top: 58px; left: 0; }
  #btn-right { top: 58px; right: 0; }

  #overlay {
    display: none; position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.78); flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; z-index: 20;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-family: 'Fredoka One', cursive; font-size: clamp(26px,8vw,50px);
    color: #ffd700; text-shadow: 0 0 20px #ffd70066; }
  #overlay p { font-size: 17px; color: #ccc; text-align: center; }
  #play-btn {
    background: #ffd700; color: #0f0e17; border: none; border-radius: 12px;
    padding: 12px 36px; font-family: 'Fredoka One', cursive; font-size: 20px;
    cursor: pointer; transition: transform 0.1s;
  }
  #play-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div id="topbar">
  <a id="back-link" href="index.html">← back</a>
  <div id="score-display">0</div>
  <div id="lives-display"></div>
</div>
<div id="game-wrap"><canvas id="c"></canvas></div>
<div id="mobile-controls">
  <div class="dpad-btn" id="btn-up">▲</div>
  <div class="dpad-btn" id="btn-down">▼</div>
  <div class="dpad-btn" id="btn-left">◀</div>
  <div class="dpad-btn" id="btn-right">▶</div>
</div>
<div id="overlay" class="show">
  <div style="font-size:3.5rem">👻</div>
  <h2 id="ov-title">Pac-Man</h2>
  <p id="ov-sub">Arrow keys or tap to move<br>Eat all the dots!</p>
  <button id="play-btn">Play!</button>
</div>

<script>
// ── MAP ──────────────────────────────────────────────────────────────────────
const MAP_SRC = [
  '#####################',
  '#.........#.........#',
  '#.###.###.#.###.###.#',
  '#o###.###.#.###.###o#',
  '#...................#',
  '#.###.#.#####.#.###.#',
  '#.....#...#...#.....#',
  '#####.###   ###.#####',
  '#####.#  GGG  #.#####',
  '#####.#       #.#####',
  '#####.#########.#####',
  '#...................#',
  '#.###.###.#.###.###.#',
  '#o..#.....#.....#..o#',
  '###.#.#########.#.###',
  '#.......#   #.......#',
  '#.#####.#####.#####.#',
  '#...................#',
  '#.###.###.#.###.###.#',
  '#.........#.........#',
  '#####################',
];
const ROWS = MAP_SRC.length;    // 21
const COLS = MAP_SRC[0].length; // 21
const WALL=0, DOT=1, PELLET=2, EMPTY=3;

let mapBase = [], map = [], totalDots = 0;

function buildMap() {
  mapBase = []; totalDots = 0;
  for (let r = 0; r < ROWS; r++) {
    mapBase[r] = [];
    for (let c = 0; c < COLS; c++) {
      const ch = MAP_SRC[r][c];
      if      (ch === '#') mapBase[r][c] = WALL;
      else if (ch === '.') { mapBase[r][c] = DOT;    totalDots++; }
      else if (ch === 'o') { mapBase[r][c] = PELLET; totalDots++; }
      else                  mapBase[r][c] = EMPTY;
    }
  }
}

function copyMap() { map = mapBase.map(r => [...r]); }

function isWall(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return true;
  return map[r][c] === WALL;
}

// ── CANVAS ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let CS = 24, OX = 0, OY = 0; // cell size, offset

function resize() {
  const wrap = document.getElementById('game-wrap');
  const W = wrap.clientWidth  || window.innerWidth;
  const H = wrap.clientHeight || (window.innerHeight - 48);
  canvas.width  = W;
  canvas.height = H;
  CS = Math.min(Math.floor(W / COLS), Math.floor(H / ROWS));
  OX = Math.floor((W - CS * COLS) / 2);
  OY = Math.floor((H - CS * ROWS) / 2);
}

// ── CELL HELPERS ─────────────────────────────────────────────────────────────
// px position of the CENTER of grid cell (col, row)
function cellCX(c) { return c * CS + CS / 2; }
function cellCY(r) { return r * CS + CS / 2; }

// grid col/row from pixel (cell that contains the center pixel)
function pxToCol(x) { return Math.max(0, Math.min(COLS-1, Math.floor(x / CS))); }
function pxToRow(y) { return Math.max(0, Math.min(ROWS-1, Math.floor(y / CS))); }

// ── GAME STATE ────────────────────────────────────────────────────────────────
let score=0, lives=3, dotsLeft=0, frame=0;
let frightTimer=0, eatMult=200, flashTimer=0;
let state = 'start'; // start | playing | dying | win | gameover

// ── PAC-MAN ───────────────────────────────────────────────────────────────────
const PAC_COL = 10, PAC_ROW = 17;
let pac;

function resetPac() {
  pac = {
    x: cellCX(PAC_COL),
    y: cellCY(PAC_ROW),
    col: PAC_COL, row: PAC_ROW,
    dir:  { x: 0, y: 0 },
    want: { x: 1, y: 0 }, // desired direction (buffered)
    mouth: 0.2,
    mouthDir: 1,
    speed: CS * 0.065,
  };
}

// ── GHOSTS ────────────────────────────────────────────────────────────────────
const GHOST_DEFS = [
  { name:'Blinky', color:'#ff0000', sc:9,  sr:8  },
  { name:'Pinky',  color:'#ffb8ff', sc:10, sr:8  },
  { name:'Inky',   color:'#00ffff', sc:9,  sr:9  },
  { name:'Clyde',  color:'#ffb852', sc:11, sr:9  },
];
const HOME_COL = 10, HOME_ROW = 9;
let ghosts = [];

function resetGhosts() {
  ghosts = GHOST_DEFS.map(def => ({
    name:  def.name,
    color: def.color,
    x: cellCX(def.sc),
    y: cellCY(def.sr),
    col: def.sc, row: def.sr,
    dir: { x: 0, y: 1 },
    gstate: 'normal', // normal | frightened | eaten
  }));
}

// ── BFS ───────────────────────────────────────────────────────────────────────
const DIRS4 = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];

function bfsDist(sc, sr, tc, tr) {
  if (sc===tc && sr===tr) return 0;
  const vis = new Uint8Array(ROWS*COLS);
  const q = [sc + sr*COLS, 0]; // interleaved [cell_index, dist]
  vis[sc + sr*COLS] = 1;
  let qi = 0;
  while (qi < q.length) {
    const ci = q[qi++], dist = q[qi++];
    const c = ci % COLS, r = (ci/COLS)|0;
    for (const d of DIRS4) {
      const nc=c+d.x, nr=r+d.y;
      if (isWall(nc,nr)) continue;
      if (nc===tc && nr===tr) return dist+1;
      const nk = nc+nr*COLS;
      if (!vis[nk]) { vis[nk]=1; q.push(nk, dist+1); }
    }
  }
  return Infinity;
}

// Choose best direction for a ghost from (col,row) toward (tc,tr).
// maximize=true picks the FARTHEST direction (frightened mode).
// forbid: direction ghost cannot take (no reversing).
function chooseDir(col, row, tc, tr, forbid, maximize) {
  let best = null, bestVal = maximize ? -Infinity : Infinity;
  for (const d of DIRS4) {
    if (forbid && d.x === forbid.x && d.y === forbid.y) continue;
    const nc = col+d.x, nr = row+d.y;
    if (isWall(nc,nr)) continue;
    const v = bfsDist(nc,nr,tc,tr);
    if (maximize ? v > bestVal : v < bestVal) { bestVal=v; best=d; }
  }
  // If no valid non-reverse dir, allow reversal
  if (!best) {
    for (const d of DIRS4) {
      const nc=col+d.x, nr=row+d.y;
      if (!isWall(nc,nr)) { best=d; break; }
    }
  }
  return best || {x:1,y:0};
}

// ── MOVEMENT CORE ─────────────────────────────────────────────────────────────
// Move entity (has x,y,col,row,dir) by speed.
// When it crosses a cell center, call onCenter(col, row) → return new dir.
// Returns true if center was crossed this frame.
function moveEntity(ent, speed, onCenter) {
  const ox = ent.x, oy = ent.y;
  ent.x += ent.dir.x * speed;
  ent.y += ent.dir.y * speed;

  const oldCol = pxToCol(ox), oldRow = pxToRow(oy);
  const newCol = pxToCol(ent.x), newRow = pxToRow(ent.y);

  // Detect crossing into a new cell OR being at starting cell center
  const enteredNew = (newCol !== oldCol || newRow !== oldRow);

  // Also handle stationary entity trying to start (dir={0,0})
  const stationary = (ent.dir.x === 0 && ent.dir.y === 0);

  if (enteredNew || stationary) {
    // Snap to the center of the cell we just entered (or current cell if stationary)
    const snapCol = enteredNew ? newCol : oldCol;
    const snapRow = enteredNew ? newRow : oldRow;
    ent.x = cellCX(snapCol);
    ent.y = cellCY(snapRow);
    ent.col = snapCol;
    ent.row = snapRow;

    // Ask caller what direction to use next
    const newDir = onCenter(snapCol, snapRow);
    if (newDir) ent.dir = newDir;

    // Make sure we're not inside a wall after direction change
    if (isWall(ent.col + ent.dir.x, ent.row + ent.dir.y) &&
        !(ent.dir.x === 0 && ent.dir.y === 0)) {
      ent.dir = {x:0, y:0};
    }
    return true;
  }

  ent.col = newCol;
  ent.row = newRow;
  return false;
}

// ── PAC UPDATE ────────────────────────────────────────────────────────────────
function updatePac() {
  const speed = pac.speed;

  moveEntity(pac, speed, (col, row) => {
    // Try desired direction first
    if (!isWall(col + pac.want.x, row + pac.want.y)) {
      pac.dir = { ...pac.want };
    }
    // If current direction is now blocked, stop
    if (isWall(col + pac.dir.x, row + pac.dir.y)) {
      return {x:0, y:0};
    }
    return pac.dir;
  });

  // If stopped and desired direction opens up, try again
  if (pac.dir.x === 0 && pac.dir.y === 0) {
    if (!isWall(pac.col + pac.want.x, pac.row + pac.want.y)) {
      pac.dir = { ...pac.want };
    }
  }

  // Mouth animation
  if (pac.dir.x !== 0 || pac.dir.y !== 0) {
    pac.mouth += pac.mouthDir * 0.13;
    if (pac.mouth > 0.68) pac.mouthDir = -1;
    if (pac.mouth < 0.04) pac.mouthDir =  1;
  }

  // Collect dots
  const cell = map[pac.row]?.[pac.col];
  if (cell === DOT) {
    map[pac.row][pac.col] = EMPTY;
    score += 10; dotsLeft--;
    updateHUD();
    if (dotsLeft <= 0) win();
  } else if (cell === PELLET) {
    map[pac.row][pac.col] = EMPTY;
    score += 50; dotsLeft--;
    eatMult = 200;
    frightTimer = 300;
    ghosts.forEach(g => { if (g.gstate !== 'eaten') g.gstate = 'frightened'; });
    updateHUD();
    if (dotsLeft <= 0) win();
  }
}

// ── GHOST UPDATE ──────────────────────────────────────────────────────────────
function ghostTarget(g) {
  switch (g.name) {
    case 'Blinky': return { c: pac.col, r: pac.row };
    case 'Pinky':  return { c: pac.col + pac.dir.x*4, r: pac.row + pac.dir.y*4 };
    case 'Inky':   return { c: pac.col, r: pac.row };
    case 'Clyde': {
      const d = Math.abs(g.col-pac.col)+Math.abs(g.row-pac.row);
      return d > 5 ? { c: pac.col, r: pac.row } : { c:1, r:19 };
    }
  }
  return { c: pac.col, r: pac.row };
}

function updateGhost(g) {
  const speed = g.gstate === 'eaten'      ? CS * 0.10
              : g.gstate === 'frightened' ? CS * 0.035
              :                             CS * 0.06;

  const forbid = {x: -g.dir.x, y: -g.dir.y};

  moveEntity(g, speed, (col, row) => {
    if (g.gstate === 'eaten') {
      if (col === HOME_COL && row === HOME_ROW) {
        g.gstate = 'normal';
        return {x:0,y:1};
      }
      return chooseDir(col, row, HOME_COL, HOME_ROW, forbid, false);
    }
    if (g.gstate === 'frightened') {
      return chooseDir(col, row, pac.col, pac.row, forbid, true);
    }
    const t = ghostTarget(g);
    return chooseDir(col, row, t.c, t.r, forbid, false);
  });
}

// ── COLLISIONS ────────────────────────────────────────────────────────────────
function checkCollisions() {
  for (const g of ghosts) {
    if (Math.hypot(g.x - pac.x, g.y - pac.y) > CS * 0.75) continue;
    if (g.gstate === 'frightened') {
      g.gstate = 'eaten';
      score += eatMult;
      eatMult = Math.min(eatMult * 2, 1600);
      updateHUD();
    } else if (g.gstate === 'normal') {
      pacDied();
      return;
    }
  }
}

function pacDied() {
  lives--;
  flashTimer = 10;
  updateHUD();
  if (lives <= 0) {
    state = 'gameover';
    showOverlay('Game Over', `Final score: ${score}`);
  } else {
    state = 'dying';
    setTimeout(() => {
      resetPac();
      resetGhosts();
      state = 'playing';
    }, 1400);
  }
}

function win() {
  state = 'win';
  showOverlay('You Win! 🎉', `Score: ${score}`);
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-display').textContent = score;
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    const c = document.createElement('canvas');
    c.width = c.height = 22;
    const x = c.getContext('2d');
    x.fillStyle = '#ffd700';
    x.beginPath();
    x.arc(11,11,9, 0.3, Math.PI*2-0.3);
    x.lineTo(11,11);
    x.closePath();
    x.fill();
    el.appendChild(c);
  }
}

// ── OVERLAY ───────────────────────────────────────────────────────────────────
function showOverlay(title, sub) {
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-sub').innerHTML = sub;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
const KEYMAP = {
  ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
  w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
  W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0},
};

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { startGame(); return; }
  if (state === 'start' || state === 'win' || state === 'gameover') { startGame(); return; }
  if (state !== 'playing') return;
  const d = KEYMAP[e.key];
  if (d) { e.preventDefault(); pac.want = d; }
});

function setupDpad() {
  const map = { 'btn-up':{x:0,y:-1}, 'btn-down':{x:0,y:1},
                'btn-left':{x:-1,y:0}, 'btn-right':{x:1,y:0} };
  for (const [id, dir] of Object.entries(map)) {
    const el = document.getElementById(id);
    const press = (e) => {
      e.preventDefault();
      el.classList.add('pressed');
      if (state === 'start' || state === 'win' || state === 'gameover') { startGame(); return; }
      if (state === 'playing') pac.want = dir;
    };
    const release = (e) => { e.preventDefault(); el.classList.remove('pressed'); };
    el.addEventListener('touchstart', press, {passive:false});
    el.addEventListener('touchend',   release, {passive:false});
    el.addEventListener('mousedown',  press);
    el.addEventListener('mouseup',    release);
  }
}

document.getElementById('play-btn').addEventListener('click', startGame);

// ── GAME INIT ─────────────────────────────────────────────────────────────────
function startGame() {
  buildMap();
  copyMap();
  dotsLeft = totalDots;
  score = 0; lives = 3;
  frightTimer = 0; eatMult = 200;
  flashTimer = 0; frame = 0;
  resetPac();
  resetGhosts();
  state = 'playing';
  hideOverlay();
  updateHUD();
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function drawMaze() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = OX + c*CS, y = OY + r*CS;
      if (map[r][c] === WALL) {
        ctx.fillStyle = '#1a1a6e';
        ctx.fillRect(x, y, CS, CS);
        // inner border gives the "neon wall" look
        const p = Math.max(1, CS * 0.1);
        ctx.strokeStyle = '#4040c0';
        ctx.lineWidth = Math.max(1, CS * 0.07);
        ctx.strokeRect(x+p, y+p, CS-p*2, CS-p*2);
      } else {
        ctx.fillStyle = '#0a0918';
        ctx.fillRect(x, y, CS, CS);
      }
    }
  }
}

function drawDots() {
  const dotR    = Math.max(1.5, CS * 0.1);
  const pelletR = Math.max(3, CS * 0.22) + Math.sin(frame * 0.12) * CS * 0.04;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = map[r][c];
      if (cell === DOT) {
        ctx.fillStyle = '#dddddd';
        ctx.beginPath();
        ctx.arc(OX+cellCX(c), OY+cellCY(r), dotR, 0, Math.PI*2);
        ctx.fill();
      } else if (cell === PELLET) {
        ctx.fillStyle = '#ffd700';
        ctx.shadowColor = '#ffd700'; ctx.shadowBlur = CS*0.4;
        ctx.beginPath();
        ctx.arc(OX+cellCX(c), OY+cellCY(r), pelletR, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }
}

function drawPac() {
  const x = OX + pac.x, y = OY + pac.y;
  const r = CS * 0.44;
  let angle = 0;
  if      (pac.dir.x ===  1) angle = 0;
  else if (pac.dir.x === -1) angle = Math.PI;
  else if (pac.dir.y ===  1) angle = Math.PI/2;
  else if (pac.dir.y === -1) angle = -Math.PI/2;

  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ffd70055'; ctx.shadowBlur = CS*0.15;
  ctx.beginPath();
  if (pac.dir.x === 0 && pac.dir.y === 0) {
    ctx.arc(x, y, r, 0, Math.PI*2);
  } else {
    ctx.moveTo(x,y);
    ctx.arc(x, y, r, angle+pac.mouth, angle+Math.PI*2-pac.mouth);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawGhost(g) {
  const x = OX + g.x, y = OY + g.y;
  const r = CS * 0.44;
  const flashing = g.gstate==='frightened' && frightTimer<120 && Math.floor(frame/12)%2===0;

  if (g.gstate === 'eaten') {
    // Eyes only
    drawEyes(x, y-r*0.1, r, g.dir, '#fff', '#00aaff');
    return;
  }

  const col = g.gstate==='frightened' ? (flashing ? '#fff' : '#0055cc') : g.color;
  ctx.fillStyle = col;
  ctx.shadowColor = col+'88'; ctx.shadowBlur = CS*0.1;

  // Body: semicircle top + rectangular sides + wavy bottom
  const bot = y + r*0.85;
  ctx.beginPath();
  ctx.arc(x, y - r*0.1, r, Math.PI, 0);
  ctx.lineTo(x+r, bot);
  const bumps = 3, bw = (r*2)/bumps;
  for (let i = bumps; i >= 0; i--) {
    const bx = x + r - i*bw;
    const peak = (i%2===0) ? bot - r*0.22 : bot + r*0.05;
    if (i===bumps) ctx.lineTo(bx, peak);
    else           ctx.quadraticCurveTo(bx, peak, bx + bw/2, bot);
  }
  ctx.lineTo(x-r, bot);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // Face
  if (g.gstate === 'frightened' && !flashing) {
    // scared dots + squiggly mouth
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x-r*0.3, y-r*0.1, r*0.12, 0, Math.PI*2);
    ctx.arc(x+r*0.3, y-r*0.1, r*0.12, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=Math.max(1,r*0.1);
    ctx.beginPath();
    ctx.moveTo(x-r*0.4, y+r*0.2);
    ctx.quadraticCurveTo(x-r*0.1, y+r*0.4, x,      y+r*0.2);
    ctx.quadraticCurveTo(x+r*0.1, y,        x+r*0.4, y+r*0.2);
    ctx.stroke();
  } else {
    drawEyes(x, y-r*0.1, r, g.dir, '#fff', '#000088');
  }
}

function drawEyes(x, y, r, dir, wc, pc) {
  const ex = r*0.28, er = r*0.2, pr = r*0.12;
  const pdx = dir.x*r*0.1, pdy = dir.y*r*0.1;
  for (const sx of [-ex, ex]) {
    ctx.fillStyle=wc; ctx.beginPath(); ctx.arc(x+sx,y,er,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pc; ctx.beginPath(); ctx.arc(x+sx+pdx,y+pdy,pr,0,Math.PI*2); ctx.fill();
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frame++;

  ctx.fillStyle = '#0a0918';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if (state === 'playing') {
    if (frightTimer > 0) {
      frightTimer--;
      if (frightTimer === 0)
        ghosts.forEach(g => { if (g.gstate==='frightened') g.gstate='normal'; });
    }
    updatePac();
    ghosts.forEach(updateGhost);
    checkCollisions();
  }

  drawMaze();
  drawDots();
  ghosts.forEach(drawGhost);
  if (state !== 'gameover' && state !== 'win') drawPac();

  // Red flash on death
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,0,0,${flashTimer/10*0.35})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    flashTimer--;
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
resize();
window.addEventListener('resize', () => {
  resize();
  if (state === 'playing' || state === 'dying') {
    pac.x = cellCX(pac.col); pac.y = cellCY(pac.row);
    pac.speed = CS * 0.09;
    ghosts.forEach(g => { g.x = cellCX(g.col); g.y = cellCY(g.row); });
  }
});

buildMap();
copyMap();
resetPac();
resetGhosts();
updateHUD();
setupDpad();
loop();
</script>
</body>
